<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWAN CART ULTRA | Next-Gen E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #080a0f;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: clamp(10px, 5vw, 40px);
        }

        /* --- Animated Mesh Background --- */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            filter: blur(80px);
            animation: meshMove 15s ease infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) rotate(3deg); }
        }

        /* --- Floating Feather Particles --- */
        .feather {
            position: absolute;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 100% 0% 100% 100%;
            opacity: 0.1;
            pointer-events: none;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* --- Main Container --- */
        .container {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%;
            max-width: 1100px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            padding: clamp(20px, 6vw, 60px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            animation: containerEntry 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }

        .brand h1 {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Catalog Grid --- */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .product-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
        }

        .product-card h3 { font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px; }
        .product-card p { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        /* --- Inputs --- */
        .input-bar {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 40px;
        }

        input {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 18px;
            color: white;
            outline: none;
            font-family: inherit;
        }

        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        /* --- Table Styling --- */
        .cart-table-container {
            width: 100%;
            overflow-x: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { padding: 25px; text-align: left; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
        td { padding: 20px 25px; border-top: 1px solid var(--glass-border); }

        /* --- Action Buttons --- */
        .btn {
            padding: 15px 30px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-add { background: var(--primary); color: #000; }
        .btn-add:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }

        .btn-export { background: transparent; border: 1px solid var(--glass-border); color: white; }
        .btn-export:hover { background: white; color: black; }

        /* --- Footer Summary --- */
        .summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            padding: 40px;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 20px;
        }

        .price-tag { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: #fff; }

        .checkout-btn {
            background: #fff;
            color: #000;
            padding: 20px 50px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        .checkout-btn:hover { letter-spacing: 2px; background: var(--primary); }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .input-bar { grid-template-columns: 1fr; }
            .header { justify-content: center; text-align: center; }
            .summary { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>
<div id="feather-box"></div>

<div class="container">
    <header class="header">
        <div class="brand">
            <h1>AWAN <span>ULTRA</span></h1>
            <p id="dateDisplay" style="opacity: 0.5; font-size: 0.8rem;"></p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-export" onclick="window.print()">EXPORT PDF</button>
            <button class="btn btn-add" style="background: var(--accent);">PRO MEMBER</button>
        </div>
    </header>

    <div class="catalog" id="catalogGrid"></div>

    <div class="input-bar">
        <input type="text" id="itemName" placeholder="Item Label...">
        <input type="number" id="itemPrice" placeholder="Value ($)">
        <button class="btn btn-add" onclick="addItem()">ADD TO LIST</button>
    </div>

    <div class="cart-table-container">
        <table>
            <thead>
                <tr>
                    <th>Product Details</th>
                    <th>Unit Cost</th>
                    <th style="text-align: right;">Management</th>
                </tr>
            </thead>
            <tbody id="cartItems"></tbody>
        </table>
    </div>

    <div class="summary" id="summaryBox" style="display: none;">
        <div>
            <p style="opacity: 0.5; margin-bottom: 5px;">ESTIMATED TOTAL</p>
            <h2 id="totalPrice" class="price-tag">$0.00</h2>
        </div>
        <button class="checkout-btn" onclick="finalize()">Finalize Purchase</button>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('awan_ultra_cart')) || [];
    
    const catalog = [
        { name: "Tesla Key", price: 45000 },
        { name: "Diamond Ring", price: 12000 },
        { name: "Private Jet (Hour)", price: 8500 },
        { name: "Luxury Villa", price: 250000 }
    ];

    window.onload = () => {
        initFeathers();
        renderCatalog();
        renderCart();
        document.getElementById("dateDisplay").innerText = "SYSTEM ACTIVE: " + new Date().toLocaleTimeString();
    };

    function initFeathers() {
        const box = document.getElementById('feather-box');
        for(let i=0; i<20; i++) {
            const f = document.createElement('div');
            f.className = 'feather';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.width = f.style.height = (Math.random() * 30 + 10) + 'px';
            f.style.animationDuration = (Math.random() * 10 + 10) + 's';
            f.style.animationDelay = (Math.random() * 10) + 's';
            box.appendChild(f);
        }
    }

    function renderCatalog() {
        const grid = document.getElementById('catalogGrid');
        grid.innerHTML = catalog.map(p => `
            <div class="product-card" onclick="addToCart('${p.name}', ${p.price})">
                <h3>${p.name}</h3>
                <p>$${p.price.toLocaleString()}</p>
            </div>
        `).join('');
    }

    function addToCart(name, price) {
        cart.push({ name, price, id: Date.now() });
        save();
    }

    function addItem() {
        const n = document.getElementById('itemName');
        const p = document.getElementById('itemPrice');
        if(n.value && p.value > 0) {
            addToCart(n.value, parseFloat(p.value));
            n.value = ''; p.value = '';
        }
    }

    function remove(id) {
        cart = cart.filter(i => i.id !== id);
        save();
    }

    function save() {
        localStorage.setItem('awan_ultra_cart', JSON.stringify(cart));
        renderCart();
    }

    function renderCart() {
        const body = document.getElementById('cartItems');
        const summary = document.getElementById('summaryBox');
        body.innerHTML = '';

        if(cart.length === 0) {
            summary.style.display = 'none';
            body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 50px; opacity: 0.3;">SYSTEM STANDBY: CART EMPTY</td></tr>';
            return;
        }

        summary.style.display = 'flex';
        let total = 0;

        cart.forEach(item => {
            total += item.price;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:8px; height:8px; background:var(--primary); border-radius:50%;"></div>
                    <b>${item.name}</b>
                </div></td>
                <td>$${item.price.toLocaleString()}</td>
                <td style="text-align: right;">
                    <button onclick="remove(${item.id})" style="background:transparent; color:#ff4d4d; border:none; cursor:pointer; font-weight:800;">CLOSE</button>
                </td>
            `;
            body.appendChild(tr);
        });

        document.getElementById('totalPrice').innerText = `$${total.toLocaleString()}`;
    }

    function finalize() {
        if(confirm("Confirm Transaction?")) {
            alert("🚀 Transaction Secure.You sucessfuly buy your items . Inventory Updated. Thanks for shoping");
            cart = [];
            save();
        }
    }
</script>
</body>
</html>
